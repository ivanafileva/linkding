events {
    worker_connections 1024;
}

http {
    upstream linkding_app {
        server linkding:9090;
    }

    server {
        listen 80;
        server_name _;

        # Pass client IP through to Django
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeout for slow archiving operations
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Raise max upload size for website snapshots
        client_max_body_size 50M;

        location / {
            proxy_pass http://linkding_app;
        }

        # Serve collected static files directly through nginx
        location /static/ {
            proxy_pass http://linkding_app/static/;
        }
    }
}
