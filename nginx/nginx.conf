events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Backend application (uWSGI) — service name "backend" in docker-compose
    upstream linkding_app {
        server backend:9090;
    }

    server {
        listen 80;
        server_name _;

        # Pass client info through to Django
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for slow archiving / snapshot operations
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Allow large uploads (website snapshots, imports)
        client_max_body_size 50M;

        # Serve the collected static build straight from the shared volume.
        # Misses (e.g. runtime-generated favicons/previews) fall back to the
        # backend, which also serves /static via uWSGI.
        location /static/ {
            alias /var/www/static/;
            try_files $uri @backend;
            access_log off;
            expires 30d;
        }

        location / {
            proxy_pass http://linkding_app;
        }

        location @backend {
            proxy_pass http://linkding_app;
        }
    }
}
