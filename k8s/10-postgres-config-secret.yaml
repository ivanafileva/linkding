---
# Non-sensitive PostgreSQL configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: linkding
data:
  POSTGRES_DB: linkding
  # Keep data in a subdirectory so the volume root (which may contain
  # lost+found) doesn't conflict with Postgres initialization.
  PGDATA: /var/lib/postgresql/data/pgdata

---
# Sensitive PostgreSQL credentials — replace base64 values before deploying.
# echo -n 'yourvalue' | base64
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: linkding
type: Opaque
data:
  POSTGRES_USER: REPLACE_WITH_BASE64     # echo -n 'youruser' | base64
  POSTGRES_PASSWORD: REPLACE_WITH_BASE64 # echo -n 'yourpassword' | base64
