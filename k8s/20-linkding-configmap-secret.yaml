---
# Non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: linkding-config
  namespace: linkding
data:
  LD_DB_ENGINE: postgres
  LD_DB_HOST: postgres
  LD_DB_PORT: "5432"
  LD_DB_DATABASE: linkding

---
# Sensitive credentials — replace base64 values before deploying to production.
# echo -n 'yourvalue' | base64
apiVersion: v1
kind: Secret
metadata:
  name: linkding-secret
  namespace: linkding
type: Opaque
data:
  LD_DB_USER: REPLACE_WITH_BASE64          # echo -n 'yourdbuser' | base64
  LD_DB_PASSWORD: REPLACE_WITH_BASE64      # echo -n 'yourdbpassword' | base64
  LD_SUPERUSER_NAME: REPLACE_WITH_BASE64   # echo -n 'youradmin' | base64
  LD_SUPERUSER_PASSWORD: REPLACE_WITH_BASE64 # echo -n 'youradminpassword' | base64
