name: CI

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  test-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python dependencies
        # Include the dev group so pytest and friends are available for the test step
        run: uv sync --frozen && mkdir -p data

      - name: Run unit tests
        run: uv run pytest bookmarks/tests/ -x -q
        env:
          DJANGO_SETTINGS_MODULE: bookmarks.settings.dev

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/linkding:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/linkding:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/linkding-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/linkding-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
