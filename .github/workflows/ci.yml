name: CI

on:
  push:
    branches:
      - main

jobs:
  test-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python dependencies
        run: uv sync --no-dev --group postgres --frozen

      - name: Run unit tests
        run: python -m pytest bookmarks/tests/ -x -q
        env:
          DJANGO_SETTINGS_MODULE: bookmarks.settings.dev

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/linkding:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/linkding:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
